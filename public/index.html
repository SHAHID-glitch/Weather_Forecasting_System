<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather Forecasting System - Get real-time weather data and forecasts">
    <title>Weather Forecasting System</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%233b82f6'/><circle cx='50' cy='40' r='20' fill='%23fff' opacity='0.9'/><path d='M 30 70 Q 40 75 50 70 Q 60 75 70 70' stroke='%23fff' stroke-width='3' fill='none' opacity='0.8'/></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <svg class="weather-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <h1>Weather Forecast</h1>
                </div>
                <nav class="nav">
                    <button class="nav-btn active" data-view="current">Current</button>
                    <button class="nav-btn" data-view="forecast">Forecast</button>
                    <button class="nav-btn" data-view="hourly">Hourly</button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Search Section -->
            <section class="search-section">
                <div class="search-container">
                    <div class="search-box">
                        <input 
                            type="text" 
                            id="cityInput" 
                            class="search-input" 
                            placeholder="Enter city name (e.g., London, Paris, Tokyo)"
                            autocomplete="off"
                        >
                        <button id="searchBtn" class="search-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            Search
                        </button>
                    </div>
                    <button id="locationBtn" class="location-btn" title="Use my location">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div id="recentSearches" class="recent-searches"></div>
            </section>

            <!-- Loading State -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>

            <!-- Error Message -->
            <div id="error" class="error hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <p id="errorMessage"></p>
            </div>

            <!-- Current Weather View -->
            <section id="currentView" class="weather-view active">
                <div id="currentWeather" class="current-weather"></div>
            </section>

            <!-- Forecast View -->
            <section id="forecastView" class="weather-view">
                <div class="forecast-header">
                    <h2>7-Day Forecast</h2>
                    <div class="forecast-controls">
                        <button class="forecast-day-btn active" data-days="5">5 Days</button>
                        <button class="forecast-day-btn" data-days="7">7 Days</button>
                        <button class="forecast-day-btn" data-days="10">10 Days</button>
                    </div>
                </div>
                <div id="forecastWeather" class="forecast-weather"></div>
            </section>

            <!-- Hourly View -->
            <section id="hourlyView" class="weather-view">
                <h2>48-Hour Forecast</h2>
                <div id="hourlyWeather" class="hourly-weather"></div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Weather data provided by OpenWeatherMap</p>
            <p>&copy; 2026 Weather Forecasting System</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
